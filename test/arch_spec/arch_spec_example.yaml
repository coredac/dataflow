# Arch spec with memory access expressed in one file at two levels:
# 1) Architectural intent: `memory_side` says which side of each CGRA connects
#    to off-chip memory.
# 2) Explicit realization: `tile_overrides` lists the concrete memory-capable
#    tiles and their FU list for simulation / Verilog comparison.
architecture:
  name: "NeuraMultiCgra"
  version: "1.0"

multi_cgra_defaults:
  base_topology: "mesh"
  rows: 2
  columns: 2
  memory:
    capacity: 2048

cgra_defaults:
  rows: 4
  columns: 4
  ctrl_mem_items: 20
  base_topology: "mesh"
  # Architectural annotation: which side of each 4x4 CGRA is attached to
  # off-chip memory.
  #
  # This does not replace the explicit `tile_overrides` below. It records the
  # intended memory attachment side, while the overrides enumerate the concrete
  # memory-capable tiles used for comparison/debugging.
  memory_side: "West"
  memory:
    banks: 4

tile_defaults:
  num_registers: 128
  # Default tiles do not assume a dedicated memory unit. Memory-capable tiles
  # are declared explicitly in `tile_overrides`.
  fu_types: ["add", "mul", "div", "fadd", "fmul", "fdiv", "logic", "cmp", "sel", "type_conv", "vfmul", "fadd_fadd", "fmul_fadd", "grant", "loop_control", "phi", "constant", "return", "alloca", "shift"]

link_defaults:
  latency: 1
  bandwidth: 32

link_overrides:
  - src_cgra_x: 0
    src_cgra_y: 0
    dst_cgra_x: 0
    dst_cgra_y: 0
    src_tile_x: 0
    src_tile_y: 0
    dst_tile_x: 1
    dst_tile_y: 1
    latency: 2
    bandwidth: 32
    existence: true

  - src_cgra_x: 1
    src_cgra_y: 0
    dst_cgra_x: 1
    dst_cgra_y: 0
    src_tile_x: 1
    src_tile_y: 1
    dst_tile_x: 0
    dst_tile_y: 0
    latency: 2
    bandwidth: 32
    existence: true

# Basic method: explicitly list the tiles on the memory-connected side and give
# them an overridden FU list that includes the mem unit. This is the concrete
# configuration used for simulation / Verilog comparison.
#
# Example below: for CGRA (0,0), the West side is attached to off-chip memory,
# so all tiles with tile_x = 0 are explicitly made memory-capable.
tile_overrides:
  - cgra_x: 0
    cgra_y: 0
    tile_x: 0
    tile_y: 0
    fu_types: ["add", "mul", "div", "fadd", "fmul", "fdiv", "logic", "cmp", "sel", "type_conv", "vfmul", "fadd_fadd", "fmul_fadd", "grant", "loop_control", "phi", "constant", "return", "alloca", "shift", "mem", "mem_indexed"]
    num_registers: 32
    existence: true

  - cgra_x: 0
    cgra_y: 0
    tile_x: 0
    tile_y: 1
    fu_types: ["add", "mul", "div", "fadd", "fmul", "fdiv", "logic", "cmp", "sel", "type_conv", "vfmul", "fadd_fadd", "fmul_fadd", "grant", "loop_control", "phi", "constant", "return", "alloca", "shift", "mem", "mem_indexed"]
    num_registers: 32
    existence: true

  - cgra_x: 0
    cgra_y: 0
    tile_x: 0
    tile_y: 2
    fu_types: ["add", "mul", "div", "fadd", "fmul", "fdiv", "logic", "cmp", "sel", "type_conv", "vfmul", "fadd_fadd", "fmul_fadd", "grant", "loop_control", "phi", "constant", "return", "alloca", "shift", "mem", "mem_indexed"]
    num_registers: 32
    existence: true

  - cgra_x: 0
    cgra_y: 0
    tile_x: 0
    tile_y: 3
    fu_types: ["add", "mul", "div", "fadd", "fmul", "fdiv", "logic", "cmp", "sel", "type_conv", "vfmul", "fadd_fadd", "fmul_fadd", "grant", "loop_control", "phi", "constant", "return", "alloca", "shift", "mem", "mem_indexed"]
    num_registers: 32
    existence: true

  # Repeat the same pattern for other CGRAs if they also expose their West side
  # to off-chip memory.

  - cgra_x: 1
    cgra_y: 0
    tile_x: 0
    tile_y: 0
    fu_types: ["add", "mul", "div", "fadd", "fmul", "fdiv", "logic", "cmp", "sel", "type_conv", "vfmul", "fadd_fadd", "fmul_fadd", "grant", "loop_control", "phi", "constant", "return", "alloca", "shift", "mem", "mem_indexed"]
    num_registers: 32
    existence: true

  - cgra_x: 1
    cgra_y: 0
    tile_x: 1
    tile_y: 1
    num_registers: 32
    existence: false

extensions:
  placeholder: false

simulator:
  execution_model: "serial"

  logging:
    enabled: true
    file: "output.log"

  driver:
    name: "Driver"
    frequency: "1GHz"

  device:
    name: "Device"
    frequency: "1GHz"
    bind_to_architecture: true
