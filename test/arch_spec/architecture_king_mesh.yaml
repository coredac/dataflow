architecture:
  name: "NeuraMultiCgra"
  version: "1.0"

multi_cgra_defaults:
  base_topology: "mesh"
  rows: 1
  columns: 1

per_cgra_defaults:
  rows: 4
  columns: 4
  ctrl_mem_items: 20
  base_topology: "king_mesh"

tile_defaults:
  num_registers: 32
  fu_types: ["add", "mul", "div", "fadd", "fmul", "fdiv", "logic", "cmp", "sel", "type_conv", "vfmul", "fadd_fadd", "fmul_fadd", "grant", "loop_control", "phi", "constant", "return", "alloca", "shift"]

link_defaults:
  latency: 1
  bandwidth: 32

link_overrides:

tile_overrides:
  # Enable memory FU only on the 7 boundary tiles:
  # left column (0,0)..(0,3) and top/bottom row continuation (1,0)..(3,0).
  - cgra_x: 0
    cgra_y: 0
    tile_x: 0
    tile_y: 0
    fu_types: ["add", "mul", "div", "fadd", "fmul", "fdiv", "logic", "cmp", "sel", "type_conv", "vfmul", "fadd_fadd", "fmul_fadd", "grant", "loop_control", "phi", "constant", "return", "alloca", "shift", "mem", "mem_indexed"]
    num_registers: 32
    existence: true

  - cgra_x: 0
    cgra_y: 0
    tile_x: 0
    tile_y: 1
    fu_types: ["add", "mul", "div", "fadd", "fmul", "fdiv", "logic", "cmp", "sel", "type_conv", "vfmul", "fadd_fadd", "fmul_fadd", "grant", "loop_control", "phi", "constant", "return", "alloca", "shift", "mem", "mem_indexed"]
    num_registers: 32
    existence: true

  - cgra_x: 0
    cgra_y: 0
    tile_x: 0
    tile_y: 2
    fu_types: ["add", "mul", "div", "fadd", "fmul", "fdiv", "logic", "cmp", "sel", "type_conv", "vfmul", "fadd_fadd", "fmul_fadd", "grant", "loop_control", "phi", "constant", "return", "alloca", "shift", "mem", "mem_indexed"]
    num_registers: 32
    existence: true

  - cgra_x: 0
    cgra_y: 0
    tile_x: 0
    tile_y: 3
    fu_types: ["add", "mul", "div", "fadd", "fmul", "fdiv", "logic", "cmp", "sel", "type_conv", "vfmul", "fadd_fadd", "fmul_fadd", "grant", "loop_control", "phi", "constant", "return", "alloca", "shift", "mem", "mem_indexed"]
    num_registers: 32
    existence: true

  - cgra_x: 0
    cgra_y: 0
    tile_x: 1
    tile_y: 0
    fu_types: ["add", "mul", "div", "fadd", "fmul", "fdiv", "logic", "cmp", "sel", "type_conv", "vfmul", "fadd_fadd", "fmul_fadd", "grant", "loop_control", "phi", "constant", "return", "alloca", "shift", "mem", "mem_indexed"]
    num_registers: 32
    existence: true

  - cgra_x: 0
    cgra_y: 0
    tile_x: 2
    tile_y: 0
    fu_types: ["add", "mul", "div", "fadd", "fmul", "fdiv", "logic", "cmp", "sel", "type_conv", "vfmul", "fadd_fadd", "fmul_fadd", "grant", "loop_control", "phi", "constant", "return", "alloca", "shift", "mem", "mem_indexed"]
    num_registers: 32
    existence: true

  - cgra_x: 0
    cgra_y: 0
    tile_x: 3
    tile_y: 0
    fu_types: ["add", "mul", "div", "fadd", "fmul", "fdiv", "logic", "cmp", "sel", "type_conv", "vfmul", "fadd_fadd", "fmul_fadd", "grant", "loop_control", "phi", "constant", "return", "alloca", "shift", "mem", "mem_indexed"]
    num_registers: 32
    existence: true

extensions:
  crossbar: false

simulator:
  execution_model: "serial"

  logging:
    enabled: true
    file: "output.log"

  driver:
    name: "Driver"
    frequency: "1GHz"

  device:
    name: "Device"
    frequency: "1GHz"
    bind_to_architecture: true
